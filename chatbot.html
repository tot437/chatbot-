<!DOCTYPE html>
<html>

<head>
    <title>Chatbot</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
        function ChatInput({ onSendMessage }) { const [inputText, setInputText] = React.useState(''); function saveInputText(event){ setInputText(event.target.value); } return (
        <>
            <input value={inputText} onChange={saveInputText} placeholder="Send a message to Chatbot" size="30" />
            <button onClick={()=> { onSendMessage(inputText); setInputText(''); }}>Send</button>
            </> ); } function ChatMessage({ message, sender }) { return (
            <div>
                {sender === 'robot' && <img src="./photos/robot.png" width="50" />} {message} {sender === 'user' && <img src="./photos/user.png" width="50" />}
            </div>
            ); } function App() { const [chatMessages, setChatMessages] = React.useState([ {message:"hello chatbot", sender:"user", id: 1}, {message:"Hello! How can I help you?", sender:"robot", id: 2}, {message:"can you get me todays date?", sender:"user", id: 3},
            {message:"Today is June 30", sender:"robot", id: 4} ]); function sendMessage(text) { const newUserMessage = { message: text, sender: 'user', id: crypto.randomUUID() }; const updatedMessages = [...chatMessages, newUserMessage]; setChatMessages(updatedMessages);
            const response = Chatbot.getResponse(text); setChatMessages([...updatedMessages, { message: response, sender: 'robot', id: crypto.randomUUID() }]); } return (
            <>
                <ChatInput onSendMessage={sendMessage} /> {chatMessages.map((chatMessage) => (
                <ChatMessage key={chatMessage.id} message={chatMessage.message} sender={chatMessage.sender} /> ))}
                </> ); } const container = document.querySelector('.js-container'); ReactDOM.createRoot(container).render(
                <App />);
    </script>
</body>

</html>
