<!DOCTYPE html>
<html>

	<head>
		<title>Chatbot</title>
		<style>
			body {
				font-family: Arial;
				margin-top: 0;
				margin-bottom: 0;
			}
			
			button {
				background-color: rgb(25, 135, 84);
				color: white;
				padding: 10px 20px;
				margin-left: 10px;
				border: none;
				border-radius: 10px;
				font-size: 15px;
				cursor: pointer;
			}
			
			.chat-input-container {
				display: flex;
				margin-bottom: 60px;
			}
			
			.chat-input {
				font-size: 15px;
				padding: 12px 15px;
				border-width: 1px;
				border-radius: 10px;
				margin-right: 10px;
				flex-grow: 1;
			}
			
			.chat-container {
				max-width: 600px;
				margin-left: auto;
				margin-right: auto;
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: scroll;
				scrollbar-width: none;
			}
			
			.chat-message-user {
				display: flex;
				justify-content: end;
				align-items: start;
			}
			
			.user-img {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				overflow: clip;
			}
			
			.chat-message-robot {
				display: flex;
				justify-content: start;
				align-items: start;
			}
			
			.robot-img {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				overflow: clip;
			}
			
			.chat-message-text {
				background-color: rgb(238, 238, 238);
				padding: 15px 20px;
				border-radius: 10px;
				max-width: 300px;
				margin-top: 0;
				margin-bottom: 0;
				overflow-wrap: break-word;
				max-width: 300px;
			}
			
			.chat-messages-container {
				flex-grow: 1;
				margin-top: 20px;
			}
		</style>
	</head>

	<body>
		<div class="js-container"></div>

		<script src="https://unpkg.com/supersimpledev/react.js"></script>
		<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
		<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
		<script src="https://unpkg.com/supersimpledev/babel.js"></script>

		<script type="text/babel">
			function ChatInput({ onSendMessage }) { const [inputText, setInputText] = React.useState(''); function saveInputText(event){ setInputText(event.target.value); } return (
				<div className="chat-input-container">
				<input className="chat-input" value={inputText} onChange={saveInputText} placeholder="Send a message to Chatbot" size="30" />
				<button onClick={()=> { onSendMessage(inputText); setInputText(''); }}>Send</button>
				</div> ); } function ChatMessage({ message, sender }) { const chatMessageRef = React.useRef(null); React.useEffect(()=>{ const containerElement = chatMessageRef.current; if(containerElement) { containerElement.scrollTop = containerElement.scrollHeight;
			} },[ChatMessage]); return (
		<div className="chat-messages-container" Ref={chatMessageRef}>
		<div className={sender==='robot' ? 'chat-message-robot' : 'chat-message-user'}>
		{sender === 'robot' && <img src="./photos/robot.png" className="robot-img" />}
		<div className="chat-message-text">{message}</div> {sender === 'user' && <img src="./photos/user.png" className="user-img" />}
		</div>
		</div>
	); } function App() { const [chatMessages, setChatMessages] = React.useState([ {message:"hello chatbot", sender:"user", id: 1}, {message:"Hello! How can I help you?", sender:"robot", id: 2}, {message:"can you get me todays date?", sender:"user", id: 3},
		{message:"Today is June 30", sender:"robot", id: 4} ]); function sendMessage(text) { const newUserMessage = { message: text, sender: 'user', id: crypto.randomUUID() }; const updatedMessages = [...chatMessages, newUserMessage]; setChatMessages(updatedMessages);
	const response = Chatbot.getResponse(text); setChatMessages([...updatedMessages, { message: response, sender: 'robot', id: crypto.randomUUID() }]); } return (
	<div className="chat-container">
	{chatMessages.map((chatMessage) => (
		<ChatMessage key={chatMessage.id} message={chatMessage.message} sender={chatMessage.sender} /> ))}
	<ChatInput onSendMessage={sendMessage} />
	</div> ); } const container = document.querySelector('.js-container'); ReactDOM.createRoot(container).render(
	<App />);
		</script>
	</body>
</html>
